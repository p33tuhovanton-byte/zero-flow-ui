name: Zero-Collection Architecture CI & Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-run:
    name: Build Module and Execute Example
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Verify Core Module Dependencies
        run: go mod tidy

      # Прямой запуск файла без использования сломанных контекстов go.work
      - name: Compile and Run Example Application
        run: go run main/main.go

  build-android:
    name: Build Android Target Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Gomobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      # Сборка Android-бинарника напрямую из папки примера
      - name: Build Android App (APK / Native Shared Library)
        run: |
          gomobile init
          GOOS=android GOARCH=arm64 go build -o example-android-arm64 main/main.go

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-assets
          path: |
            example-android-arm64
