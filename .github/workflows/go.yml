name: Zero-Collection Architecture CI & Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-run:
    name: Build Module and Execute Example
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Verify Core Module Dependencies
        run: go mod tidy

      # Прямой запуск файла без использования сломанных контекстов go.work
      - name: Compile and Run Example Application
        run: go run example/main.go

  build-android-apk:
    name: Build Native Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 🛠️ ВАЖНО: Установка Android NDK для компиляции C-go кода под мобильные процессоры
      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653" >> $GITHUB_ENV

      # Установка Go среды (требуется версия 1.26)
      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # Установка инструментов компиляции Gomobile
      - name: Install Gomobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      # Сборка полноценного автономного APK файла
      - name: Compile Android APK via Gomobile
        run: |
          gomobile init
          # Ключевая команда: собирает приложение и генерирует готовый файл zero-flow.apk
          gomobile build -target=android -o zero-flow.apk example/main.go

      # Загрузка готового APK в артефакты репозитория GitHub
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: native-android-apk
          path: zero-flow.apk