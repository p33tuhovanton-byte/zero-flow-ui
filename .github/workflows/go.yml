name: Zero-Collection Architecture CI & Android APK Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-module:
    name: Validate Core Module Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Verify Core Module Dependencies
        run: go mod tidy

      - name: Validate Core Library Syntax
        run: go build -v .

  build-android-apk:
    name: Build Native Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Gomobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      # 🛠️ ИСПРАВЛЕННЫЙ ШАГ: Явно задаем поддерживаемую версию API через флаг -androidapi
      - name: Compile Android APK via Gomobile
        run: |
          gomobile init
          gomobile build -androidapi 21 -target=android -o zero-flow.apk example/main.go

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: native-android-apk
          path: zero-flow.apk
