name: Zero-Collection Architecture CI & Android APK Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-module:
    name: Validate Core Module Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify Core Module Dependencies
        run: go mod tidy

      - name: Validate Core Library Syntax
        run: go build -v .

      # Перенесено внутрь блока steps задачи validate-module
      - name: Build Go application
        working-directory: ./zero-flow-ui
        run: |
          go mod tidy
          # Сохраняем бинарник в корень всего репозитория (../)
          go build -o ../my-go-app ./example/main.go

      - name: Install Node.js dependencies & Build TS
        run: |
          npm install
          npx tsc

      - name: Run Application
        run: npm start

  build-android-apk:
    name: Build Native Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Gomobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Compile Android APK via Gomobile
        # Если example лежит внутри zero-flow-ui, нужно добавить working-directory: ./zero-flow-ui
        run: |
          gomobile init
          go get golang.org/x/mobile@latest
          go mod tidy
          GO111MODULE=on gomobile build -androidapi 21 -target=android -o zero-flow.apk ./example

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: native-android-apk
          path: zero-flow.apk
