name: Zero-Collection Architecture CI & Android APK Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-all-in-one:
    name: Validate, Build TS and Compile Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- НАСТРОЙКА ОКРУЖЕНИЙ ---
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # --- НАСТРОЙКА NODE.JS ОКРУЖЕНИЯ ---
      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package.json'

      # --- ШАГ 1: СБОРКА GO-КОДА СРЕДСТВАМИ NODE.JS ---
      - name: Build Go Project via NPM Scripts
        run: |
          npm install
          npm run build:go

      # --- ШАГ 2: ВАЛИДАЦИЯ БАЗОВОГО GO МОДУЛЯ ---
      - name: Verify Core Module Dependencies
        run: go mod tidy

      - name: Validate Core Library Syntax
        run: go build -v .

      # --- ШАГ 3: СБОРКА АНДРОИД APK ЧЕРЕЗ GOMOBILE ---
      - name: Install Gomobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Compile Android APK via Gomobile
        # 🛠️ ИСПРАВЛЕНИЕ: Здесь команда gomobile найдет папку ./example прямо в корне репозитория
        run: |
          gomobile init
          go get golang.org/x/mobile@latest
          go mod tidy
          GO111MODULE=on gomobile build -androidapi 21 -target=android -o zero-flow.apk ./example

      # --- ШАГ 4: СОХРАНЕНИЕ APK СЕРВЕРОМ GITHUB ---
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: native-android-apk
          path: zero-flow.apk # Файл сохранится в корне репозитория
