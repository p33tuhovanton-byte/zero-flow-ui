name: Zero-Collection Architecture CI & Android APK Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Шаг 1: Валидация кода и сборка TypeScript-скриптов
  validate-and-build-ts:
    name: Build TypeScript and Validate Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './zero-flow-ui/package-lock.json'

      - name: Verify Core Module Dependencies
        run: go mod tidy

      - name: Validate Core Library Syntax
        run: go build -v .

      - name: Install Node.js dependencies & Build TS
        working-directory: ./zero-flow-ui
        run: |
          npm install
          npx tsc # Компилирует TS в JS (обычно в папку dist/)

      # 🔗 СВЯЗЬ: Сохраняем скомпилированный JavaScript как артефакт
      - name: Upload Compiled JS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-js-assets
          path: ./zero-flow-ui/dist/ # Укажите вашу папку вывода из tsconfig.json

  # Шаг 2: Сборка APK с внедрением собранного JavaScript
  build-android-apk:
    name: Build Native Android APK
    runs-on: ubuntu-latest
    # 🔗 СВЯЗЬ: Не запускать сборку APK, пока не завершится сборка TypeScript
    needs: validate-and-build-ts
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # 🔗 СВЯЗЬ: Скачиваем скомпилированный JS-код внутрь этой папки
      - name: Download JS Artifact for Android Assets
        uses: actions/download-artifact@v4
        with:
          name: compiled-js-assets
          # Скачиваем в папку, которую Go/Gomobile использует как ассеты (например, внутри example)
          path: ./zero-flow-ui/example/assets/ 

      - name: Install Gomobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Compile Android APK via Gomobile
        working-directory: ./zero-flow-ui
        run: |
          gomobile init
          go get golang.org/x/mobile@latest
          go mod tidy
          # Gomobile упакует папку assets/ автоматически внутрь APK
          GO111MODULE=on gomobile build -androidapi 21 -target=android -o zero-flow.apk ./example

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: native-android-apk
          path: ./zero-flow-ui/zero-flow.apk
