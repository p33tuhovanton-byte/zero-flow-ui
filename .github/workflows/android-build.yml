name: Android Gomobile Pure Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Native Fullscreen Application
    runs-on: ubuntu-latest

    env:
      GO111MODULE: "on"
      JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.19-10/x64
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Go Development Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize Gomobile Toolchain
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          go get golang.org/x/mobile@latest
          go mod tidy

      - name: Inject Production Android Manifest and Themes
        run: |
          mkdir -p example/res/values

          # 1. Генерируем тему оформления (Белый цвет + Полноэкранный режим)
          cat << 'EOF' > example/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.ZeroFlowUI" parent="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen">
                  <item name="android:windowBackground">#FFFFFF</item>
                  <item name="android:statusBarColor">#FFFFFF</item>
                  <item name="android:navigationBarColor">#FFFFFF</item>
              </style>
          </resources>
          EOF

          # 2. Генерируем манифест с корректным классом GoNativeActivity для gomobile build
          cat << 'EOF' > example/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com" 
              package="zeroflowui.example"
              android:versionCode="1"
              android:versionName="1.0">
              
              <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="30" />
              
              <application android:label="ZeroFlowUI" android:theme="@style/Theme.ZeroFlowUI" android:allowBackup="false">
                  <!-- Изменено на org.golang.mobile.GoNativeActivity для прохождения валидации компилятора -->
                  <activity android:name="org.golang.mobile.GoNativeActivity" 
                      android:exported="true"
                      android:configChanges="orientation|keyboardHidden|screenSize">
                      <meta-data android:name="android.app.lib_name" android:value="example" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build Pure Android APK via Gomobile
        run: |
          export ANDROID_NDK_HOME=""
          gomobile build -androidapi 30 -target=android -o zero-flow.apk ./example

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zero-flow-pure-apk
          path: zero-flow.apk
