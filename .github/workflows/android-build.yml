name: Android Gomobile Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Native Fullscreen Application
    runs-on: ubuntu-latest

    env:
      GO111MODULE: "on"
      JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.19-10/x64
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Go Development Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize Gomobile Toolchain
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          go get golang.org/x/mobile@latest
          go mod tidy

      - name: Cleanup Conflicting Manifest Files
        run: |
          # Полностью удаляем кастомный манифест, чтобы избежать ошибок компилятора ресурсов
          rm -f example/AndroidManifest.xml

      - name: Build Genuine Android APK via Gomobile
        run: |
          export ANDROID_NDK_HOME=""
          
          # Собираем дефолтный APK под arm64. Нам важен скомпилированный libmain.so внутри.
          gomobile build -androidapi 30 -target=android/arm64 -o zero-flow-unsigned.apk ./example

      - name: Inject Production Configurations and Sign APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -n 1)
          
          # Распаковываем APK, чтобы принудительно пересобрать манифест под правила Android 11+
          unzip zero-flow-unsigned.apk -d apk_out
          
          # Очищаем старые бинарные подписи gomobile
          rm -rf apk_out/META-INF
          
          # Собираем файлы обратно в архив
          cd apk_out && zip -r ../zero-flow-repacked.apk . && cd ..
          
          # Принудительно выравниваем все нативные .so строго по границе 4 блоков (требование Android 11+)
          # Это решает проблему "Не удалось обработать пакет" без использования флага extractNativeLibs
          $BUILD_TOOLS_DIR/zipalign -f -p 4 zero-flow-repacked.apk zero-flow-aligned.apk
          
          # Генерируем валидный криптографический ключ подписи
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # Подписываем пакет современными сигнатурами v2 и v3
          $BUILD_TOOLS_DIR/apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android --v2-signing-enabled true --v3-signing-enabled true --out zero-flow.apk zero-flow-aligned.apk

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zero-flow-apk
          path: zero-flow.apk
