name: Android Gomobile Pure Build 

on:  
push:  
branches: [ main, master ]  
pull_request:  
branches: [ main, master ]  
workflow_dispatch: 

jobs:  
build:  
runs-on: ubuntu-latest 

env:  
GO111MODULE: "on"  
JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.19-10/x64  
ANDROID_HOME: /usr/local/lib/android/sdk  
ANDROID_SDK_ROOT: /usr/local/lib/android/sdk  
ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653 

steps:  
- name: Checkout Source Code  
uses: actions/checkout@v3 

- name: Set up Go Development Environment  
uses: actions/setup-go@v4  
with:  
go-version: '1.21'  
cache: true 

- name: Set up JDK 17 (Required for Android Tools)  
uses: actions/setup-java@v3  
with:  
java-version: '17'  
distribution: 'temurin' 

- name: Initialize Gomobile Toolchain  
run: |  
go install golang.org/x/mobile/cmd/gomobile@latest  
gomobile init 

- name: Fetch and Synchronize Go Dependencies  
run: |  
go get golang.org/x/mobile@latest  
go mod tidy 

- name: Build Android APK via Pure Gomobile Tag  
run: |  
# Прямая сборка монолитного APK под Android 11 (API 30)  
# Логика белого фона и полноэкранного режима теперь работает на уровне Go-кода  
gomobile build -androidapi 30 -target=android -o zero-flow.apk ./example 

- name: Upload Compiled Pure APK Artifact  
uses: actions/upload-artifact@v3  
with:  
name: zero-flow-pure-go-apk  
path: zero-flow.apk