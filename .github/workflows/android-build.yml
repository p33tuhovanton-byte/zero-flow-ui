GITHUB\_ENV 

\- name: Initialize Gomobile Toolchain  
run: |  
go install golang.org/x/mobile/cmd/gomobile@latest  
gomobile init 

\- name: Fetch and Synchronize Go Dependencies  
run: |  
go get golang.org/x/mobile@latest  
go mod tidy 

\- name: Generate Android Resources and Directories  
run: |  
\# Автоматическое создание структуры проекта Gradle, если её нет  
mkdir -p android/app/libs  
mkdir -p android/app/src/main/res/values  
mkdir -p android/gradle/wrapper 

\- name: Generate Root build.gradle  
run: |  
cat << 'EOF' > android/build.gradle  
buildscript {  
repositories {  
google()  
mavenCentral()  
}  
dependencies {  
classpath 'com.android.tools.build:gradle:7.4.2'  
}  
}  
allprojects {  
repositories {  
google()  
mavenCentral()  
}  
}  
task clean(type: Delete) {  
delete rootProject.buildDir  
}  
EOF 

\- name: Generate App build.gradle (Target API 30 for Android 11)  
run: |  
cat << 'EOF' > android/app/build.gradle  
apply plugin: 'com.android.application' 

android {  
compileSdkVersion 30  
ndkVersion "25.2.9519653" 

defaultConfig {  
applicationId "zeroflowui.example"  
minSdkVersion 21  
targetSdkVersion 30  
versionCode 1  
versionName "1.0"  
} 

buildTypes {  
release {  
minifyEnabled false  
proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'  
}  
}  
} 

dependencies {  
implementation fileTree(dir: 'libs', include: \['*.jar', '*.aar'\])  
}  
EOF 

\- name: Generate Fullscreen White Theme (themes.xml)  
run: |  
cat << 'EOF' > android/app/src/main/res/values/themes.xml  
  
  
  
#FFFFFF  
#FFFFFF  
#FFFFFF  
false  
  
  
EOF 

\- name: Generate Production AndroidManifest.xml  
run: |  
cat << 'EOF' > android/app/src/main/src/main/AndroidManifest.xml  
  
 

  
  
  
  
  
  
  
  
EOF 

\- name: Setup Gradle Wrapper Environment  
run: |  
cd android  
gradle wrapper --gradle-version 7.5 

\- name: Execute Gomobile Bind (Compile Go to Native AAR)  
run: |  
gomobile bind -androidapi 30 -target=android -o ./android/app/libs/zero\_flow.aar ./example 

\- name: Compile Fullscreen White Android APK via Gradle  
run: |  
cd android  
chmod +x gradlew  
./gradlew assembleDebug 

\- name: Upload Compiled Production APK Artifact  
uses: actions/upload-artifact@v3  
with:  
name: zero-flow-api30-apps  
path: android/app/build/outputs/apk/debug/app-debug.apk