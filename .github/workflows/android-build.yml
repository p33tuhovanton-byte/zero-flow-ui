name: Android Gomobile Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Native Fullscreen Application
    runs-on: ubuntu-latest

    env:
      GO111MODULE: "on"
      JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.19-10/x64
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Go Development Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize Gomobile Toolchain
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          go get golang.org/x/mobile@latest
          go mod tidy

      - name: Inject Production Android Manifest
        run: |
          # Используем встроенную системную тему NoTitleBar.Fullscreen
          # Это гарантирует, что компилятор gomobile успешно найдет стиль
          cat << 'EOF' > example/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com" 
              package="zeroflowui.example"
              android:versionCode="1"
              android:versionName="1.0">
              
              <application android:label="ZeroFlowUI" android:theme="@android:style/Theme.NoTitleBar.Fullscreen" android:allowBackup="false">
                  <activity android:name="org.golang.app.GoNativeActivity" 
                      android:exported="true"
                      android:configChanges="orientation|keyboardHidden|screenSize">
                      <meta-data android:name="android.app.lib_name" android:value="example" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build Android APK via Gomobile
        run: |
          export ANDROID_NDK_HOME=""
          gomobile build -androidapi 30 -target=android -o zero-flow.apk ./example

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zero-flow-apk
          path: zero-flow.apk
