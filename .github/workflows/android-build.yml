name: Android Gradle and Gobind Plugin Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build via Gradle Gobind Plugin
    runs-on: ubuntu-latest

    env:
      GO111MODULE: "on"
      JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.19-10/x64
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Go Development Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize Gomobile Toolchain
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          go get golang.org/x/mobile@latest
          go mod tidy

      - name: Create Structure for Gradle Project
        run: |
          mkdir -p example/android/app/src/main/res/values

      - name: Generate Root build.gradle with Gobind Plugin
        run: |
          echo "include ':app'" > example/android/settings.gradle
          
          cat << 'EOF' > example/android/build.gradle
          buildscript {
              repositories { 
                  google()
                  mavenCentral()
                  gradlePluginPortal() 
              }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:7.4.2'
                  classpath 'org.golang.mobile.bind:org.golang.mobile.bind.gradle.plugin:0.2.13'
              }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

      - name: Generate App build.gradle (Target API 30 + Correct Gobind)
        run: |
          cat << 'EOF' > example/android/app/build.gradle
          apply plugin: 'com.android.application'
          apply plugin: 'org.golang.mobile.bind'

          android {
              compileSdkVersion 30
              ndkVersion "25.2.9519653"
              
              defaultConfig {
                  applicationId "zeroflowui.example"
                  minSdkVersion 21
                  targetSdkVersion 30
                  versionCode 1
                  versionName "1.0"
                  
                  // Архитектуры процессоров настраиваются здесь вместо GOARCH
                  ndk {
                      abiFilters 'armeabi-v7a', 'arm64-v8a'
                  }
              }
          }

          // Исправленный блок конфигурации без ошибочных свойств GOOS/GOARCH
          gobind {
              pkg = "../../example"
          }
          EOF

      - name: Generate Fullscreen Themes & AndroidManifest.xml
        run: |
          cat << 'EOF' > example/android/app/src/main/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.ZeroFlowUI" parent="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen">
                  <item name="android:windowBackground">#FFFFFF</item>
                  <item name="android:statusBarColor">#FFFFFF</item>
                  <item name="android:navigationBarColor">#FFFFFF</item>
              </style>
          </resources>
          EOF

          cat << 'EOF' > example/android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com" package="zeroflowui.example">
              <application android:label="ZeroFlowUI Gradle App" android:theme="@style/Theme.ZeroFlowUI">
                  <activity android:name="org.golang.mobile.AppActivity" android:exported="true" android:configChanges="orientation|keyboardHidden|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Set up and Run Gradle (Compiles Go and APK together)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.5
          build-root-directory: example/android
          arguments: assembleDebug -Dorg.gradle.environment.ANDROID_NDK_HOME=""

      - name: Upload Finished Gradle APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zero-flow-gobind-plugin-apk
          path: example/android/app/build/outputs/apk/debug/app-debug.apk
