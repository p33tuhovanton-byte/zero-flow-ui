name: Android Gomobile & Gradle Build 

on:  
push:  
branches: \[ main, master \]  
pull\_request:  
branches: \[ main, master \]  
workflow\_dispatch: 

jobs:  
build:  
runs-on: ubuntu-latest 

env:  
GO111MODULE: on  
JAVA\_HOME: /opt/hostedtoolcache/Java\_Temurin-Hotspot\_jdk/17.0.19-10/x64  
ANDROID\_HOME: /usr/local/lib/android/sdk  
ANDROID\_NDK\_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653 

steps:  
\- name: Checkout Source Code  
uses: actions/checkout@v3 

\- name: Set up Go Development Environment  
uses: actions/setup-go@v4  
with:  
go-version: '1.21'  
cache: true 

\- name: Set up JDK 17 (Temurin)  
uses: actions/setup-java@v3  
with:  
java-version: '17'  
distribution: 'temurin'  
cache: 'gradle' 

\- name: Setup Android NDK and SDK Environment  
run: |  
echo "ANDROID\_HOME=

