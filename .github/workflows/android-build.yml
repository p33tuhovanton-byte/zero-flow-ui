name: Android Gomobile Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Native Fullscreen Application
    runs-on: ubuntu-latest

    env:
      GO111MODULE: "on"
      JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.19-10/x64
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Go Development Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize Gomobile Toolchain
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          go get golang.org/x/mobile@latest
          go mod tidy

      - name: Cleanup Conflicting Local Manifests
        run: |
          # Стираем локальный манифест, чтобы компилятор gomobile использовал 
          # свой собственный, гарантированно валидный для Android инсталлятор.
          rm -f example/AndroidManifest.xml

      - name: Build Genuine Android APK via Gomobile
        run: |
          export ANDROID_NDK_HOME=""
          
          # Собираем официальный стабильный fat-пакет под Android 11 (API 30).
          # Компилятор Go сам правильно упакует нативные библиотеки.
          gomobile build -androidapi 30 -o zero-flow-unsigned.apk ./example

      - name: Sign and Align Original Android APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -n 1)
          
          # Выравниваем оригинальный рабочий APK, не разрушая его структуру распаковкой
          $BUILD_TOOLS_DIR/zipalign -f -v 4 zero-flow-unsigned.apk zero-flow-aligned.apk
          
          # Генерируем ключ авторизации
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # Подписываем оригинальный рабочий пакет современными схемами v2/v3
          $BUILD_TOOLS_DIR/apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android --v2-signing-enabled true --v3-signing-enabled true --out zero-flow.apk zero-flow-aligned.apk

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zero-flow-apk
          path: zero-flow.apk
